# Application Configuration
server.port=8080
spring.application.name=hospital-management

# ==========================================
# DATABASE CONFIGURATION: MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/hms_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Kartik@2005

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable H2 settings
spring.h2.console.enabled=false

# Spring MVC static resource configuration
spring.web.resources.static-locations=classpath:/static/
